name: Bug report
description: Report a reproducible bug with enough signal for triage by a human or agent.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Keep this focused on the failing behavior, impacted subsystem, and evidence.
        Prefer architecture or workflow terms over file-path lists.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI and tabs
        - Agent runtime
        - Tools, approvals, or worktrees
        - Persistence or artifacts
        - Terminal or PTY
        - Backend or Tauri
        - Provider or model integration
        - Build, release, or updater
        - Other
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocker
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Expected scope
      description: Best guess for the size of the fix.
      options:
        - Small or local
        - Medium
        - Large or cross-cutting
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: planning
    attributes:
      label: Planning needed
      options:
        - None or direct fix
        - Light investigation
        - Design review needed
        - Unknown
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Problem
      placeholder: Restoring a session with multiple tabs can leave the terminal pane blank until the app is restarted.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      placeholder: |
        1. Start the desktop app
        2. Restore a saved session with two tabs
        3. Switch to the second tab
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: Architectural notes
      description: Relevant subsystem boundaries, state flow, contracts, or invariants. Avoid file lists unless unavoidable.

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, stack traces, screenshots, or provider/model context if relevant.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Version, platform, reproduction frequency, or constraints.

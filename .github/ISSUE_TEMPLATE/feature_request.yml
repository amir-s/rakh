name: Feature request
description: Propose a feature with enough product and architectural context to scope it.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Keep this focused on the workflow, outcome, and architectural shape of the change.
        Prefer stable subsystem or contract descriptions over file references.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI and tabs
        - Agent runtime
        - Tools, approvals, or worktrees
        - Persistence or artifacts
        - Terminal or PTY
        - Backend or Tauri
        - Provider or model integration
        - Build, release, or updater
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Expected scope
      options:
        - Small or local
        - Medium
        - Large or cross-cutting
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: planning
    attributes:
      label: Planning needed
      options:
        - Minimal
        - Light design
        - Significant design or RFC
        - Unknown
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      placeholder: Failed runs are hard to understand without manually inspecting logs and internal debug state.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      placeholder: Add a trace summary surface that groups tool calls by run and links to deeper diagnostics.
    validations:
      required: true

  - type: textarea
    id: architecture
    attributes:
      label: Architectural detail
      description: Describe affected subsystems, data flow, contracts, state, or migration concerns. Avoid file lists unless necessary.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - The feature solves the stated workflow problem
        - Success or failure is visible in the app
        - Existing behavior remains intact unless explicitly changed
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints or non-goals
      description: Include limits, tradeoffs, rollout constraints, or things this request should not attempt.

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Examples, prior art, screenshots, or links.
